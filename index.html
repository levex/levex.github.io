<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 1.2rem;
      image-rendering: pixelated;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2.5rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    nav a, nav button {
      display: inline-block;
      padding: 0.55rem 1.4rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #c8c8d0;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: inherit;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      min-width: 200px;
    }

    nav a:hover, nav button:hover {
      border-color: #555;
      color: #fff;
      background: #1a1a1e;
    }

    nav button.coming-soon {
      border-color: #3a2a3e;
      color: #a070b0;
      cursor: default;
    }

    nav button.coming-soon:hover {
      border-color: #5a3a6e;
      color: #c090d0;
      background: #1a0f1e;
    }

    .contact {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #3a3a42;
    }

    .contact span {
      font-family: "SF Mono", "Fira Code", monospace;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://oldschool.runescape.wiki/images/Xarpus.png?a39b0" alt="Xarpus" />
    <h1>xarp.us</h1>
    <p class="tagline">osrs tools &amp; sims &amp; misc stuff</p>
    <nav>
      <a href="/osrs">OSRS Sims</a>
      <a href="/stuff">Downloads &amp; Resources</a>
      <a href="/misc">Misc Tools</a>
      <button onclick="this.textContent = this.textContent === 'Coming Soon' ? 'ToB Data/Visualizations' : 'Coming Soon'; this.classList.toggle('coming-soon')">ToB Data/Visualizations</button>
    </nav>
    <p class="contact">discord <span>@lkurusa</span></p>
  </div>
</body>
</html>
