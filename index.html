<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2.5rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    nav a {
      display: inline-block;
      padding: 0.55rem 1.4rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #c8c8d0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      min-width: 160px;
    }

    nav a:hover {
      border-color: #555;
      color: #fff;
      background: #1a1a1e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>xarp.us</h1>
    <p class="tagline">tools &amp; sims</p>
    <nav>
      <a href="/osrs">OSRS Sims</a>
    </nav>
  </div>
</body>
</html>
