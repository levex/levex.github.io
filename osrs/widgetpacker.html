<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Packer — xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 3rem 1.5rem;
    }

    .page {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 2.5rem;
      font-size: 0.85rem;
      color: #444;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: #aaa; }

    .section {
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a42;
      margin-bottom: 0.75rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.85rem;
      background: #16161a;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder { color: #3a3a42; }

    input[type="text"]:focus { border-color: #555; }

    .input-hint {
      font-size: 0.72rem;
      color: #3a3a42;
      margin-top: 0.4rem;
    }

    button {
      padding: 0.6rem 1.1rem;
      background: transparent;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      color: #c8c8d0;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    button:hover {
      border-color: #555;
      color: #fff;
      background: #1a1a1e;
    }

    .result-box {
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      background: #16161a;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      min-height: 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.4rem;
    }

    .result-empty {
      font-size: 0.8rem;
      color: #2a2a2e;
    }

    .result-row {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .result-key {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #444;
      min-width: 4rem;
    }

    .result-val {
      font-size: 1rem;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      color: #e8e8e8;
    }

    .error {
      font-size: 0.82rem;
      color: #c0392b;
    }

    .divider {
      border: none;
      border-top: 1px solid #1a1a1e;
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Widget Packer</h1>
    <p class="tagline">pack and unpack OSRS widget IDs</p>
    <a class="back" href="/osrs/misc.html">← back</a>

    <div class="section">
      <div class="section-label">Pack — group, child → ID</div>
      <div class="input-row">
        <input type="text" id="packInput" placeholder="e.g. 162, 1" />
        <button onclick="doPack()">Pack</button>
      </div>
      <div class="input-hint">Enter group and child separated by a comma</div>
      <div class="result-box" id="packResult">
        <span class="result-empty">result will appear here</span>
      </div>
    </div>

    <hr class="divider" />

    <div class="section">
      <div class="section-label">Unpack — ID → group, child</div>
      <div class="input-row">
        <input type="text" id="unpackInput" placeholder="e.g. 10616833" />
        <button onclick="doUnpack()">Unpack</button>
      </div>
      <div class="input-hint">Enter a packed widget ID (decimal or 0x hex)</div>
      <div class="result-box" id="unpackResult">
        <span class="result-empty">result will appear here</span>
      </div>
    </div>
  </div>

  <script>
    function packWidgetId(group, child) {
      return ((group & 0xFFFF) << 16) | (child & 0xFFFF);
    }

    function unpackWidgetId(packed) {
      return { group: packed >>> 16, child: packed & 0xFFFF };
    }

    function showResult(boxId, rows) {
      const box = document.getElementById(boxId);
      box.innerHTML = rows.map(([k, v]) =>
        `<div class="result-row"><span class="result-key">${k}</span><span class="result-val">${v}</span></div>`
      ).join('');
    }

    function showError(boxId, msg) {
      document.getElementById(boxId).innerHTML = `<span class="error">${msg}</span>`;
    }

    function doPack() {
      const raw = document.getElementById('packInput').value.trim();
      const parts = raw.split(',').map(s => s.trim());
      if (parts.length !== 2) {
        showError('packResult', 'Expected two numbers separated by a comma');
        return;
      }
      const group = parseInt(parts[0], 10);
      const child = parseInt(parts[1], 10);
      if (isNaN(group) || isNaN(child)) {
        showError('packResult', 'Both values must be integers');
        return;
      }
      const packed = packWidgetId(group, child);
      showResult('packResult', [
        ['packed', packed],
        ['hex', '0x' + packed.toString(16).toUpperCase()],
      ]);
    }

    function doUnpack() {
      const raw = document.getElementById('unpackInput').value.trim();
      const packed = raw.startsWith('0x') || raw.startsWith('0X')
        ? parseInt(raw, 16)
        : parseInt(raw, 10);
      if (isNaN(packed) || packed < 0) {
        showError('unpackResult', 'Enter a valid non-negative integer');
        return;
      }
      const { group, child } = unpackWidgetId(packed);
      showResult('unpackResult', [
        ['group', group],
        ['child', child],
      ]);
    }

    document.getElementById('packInput').addEventListener('keydown', e => { if (e.key === 'Enter') doPack(); });
    document.getElementById('unpackInput').addEventListener('keydown', e => { if (e.key === 'Enter') doUnpack(); });
  </script>
</body>
</html>
