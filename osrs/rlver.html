<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuneLite Version History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-btn.active {
            color: #3498db;
            border-bottom-color: #3498db;
            background: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .versions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .versions-table th {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .versions-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
        }

        .versions-table tr:hover {
            background-color: #f8f9fa;
        }

        .versions-table tr:last-child td {
            border-bottom: none;
        }

        .tag {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .version {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .maven-version {
            background: #8e44ad;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .maven-snapshot {
            background: #e67e22;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .commit-hash {
            font-family: 'Courier New', monospace;
            background: #34495e;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            display: inline-block;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
        }

        .tag-link {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .tag-link:hover {
            opacity: 0.8;
        }

        .version-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #2980b9;
            transform: scale(1.1);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-success {
            background: #27ae60 !important;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .date-cell {
            color: #555;
            font-size: 0.9rem;
            white-space: nowrap;
            min-width: 140px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RuneLite Version History</h1>
            <p>Version info from GitHub and the RuneLite Maven repository</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('github')">GitHub Tags</button>
            <button class="tab-btn" onclick="switchTab('maven')">Maven Releases</button>
        </div>

        <!-- GitHub tab -->
        <div id="tab-github" class="tab-content active">
            <button class="refresh-btn" onclick="fetchGitHubVersions()">🔄 Refresh</button>

            <div id="gh-loading" class="loading">
                <div class="spinner"></div>
                <p>Fetching RuneLite versions...</p>
            </div>

            <div id="gh-error" class="error" style="display: none;"></div>

            <table id="gh-table" class="versions-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Tag</th>
                        <th>RuneLite Version</th>
                        <th>Published</th>
                        <th>Commit Hash</th>
                    </tr>
                </thead>
                <tbody id="gh-body"></tbody>
            </table>

            <div id="gh-last-updated" class="last-updated"></div>
        </div>

        <!-- Maven tab -->
        <div id="tab-maven" class="tab-content">
            <button class="refresh-btn" onclick="fetchMavenVersions()">🔄 Refresh</button>

            <div id="mv-loading" class="loading">
                <div class="spinner"></div>
                <p>Fetching Maven metadata...</p>
            </div>

            <div id="mv-error" class="error" style="display: none;"></div>

            <table id="mv-meta-table" class="versions-table" style="display: none; margin-bottom: 24px;">
                <thead>
                    <tr>
                        <th>Latest</th>
                        <th>Release</th>
                        <th>Last Updated</th>
                    </tr>
                </thead>
                <tbody id="mv-meta-body"></tbody>
            </table>

            <table id="mv-table" class="versions-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Recent Versions</th>
                    </tr>
                </thead>
                <tbody id="mv-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', ['github', 'maven'][i] === name);
            });
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.toggle('active', el.id === 'tab-' + name);
            });
        }

        // ── GitHub tab ────────────────────────────────────────────────────────

        async function fetchGitHubVersions() {
            const loading = document.getElementById('gh-loading');
            const error   = document.getElementById('gh-error');
            const table   = document.getElementById('gh-table');
            const footer  = document.getElementById('gh-last-updated');

            loading.style.display = 'block';
            error.style.display   = 'none';
            table.style.display   = 'none';

            try {
                const res = await fetch('https://api.github.com/repos/runelite/runelite/tags?per_page=20');
                if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
                const tags = await res.json();

                const top5 = tags
                    .filter(t => t.name.startsWith('runelite-parent-'))
                    .slice(0, 5);

                // Fetch commit dates in parallel
                const dated = await Promise.all(top5.map(async tag => {
                    let date = null;
                    try {
                        const cr = await fetch(tag.commit.url);
                        if (cr.ok) {
                            const cd = await cr.json();
                            date = cd.commit?.committer?.date || cd.commit?.author?.date || null;
                        }
                    } catch (_) {}
                    return {
                        tag:        tag.name,
                        version:    tag.name.replace('runelite-parent-', ''),
                        commitHash: tag.commit.sha,
                        date
                    };
                }));

                renderGitHubVersions(dated);
                footer.textContent = `Last updated: ${new Date().toLocaleString()}`;
            } catch (err) {
                console.error(err);
                error.style.display = 'block';
                error.textContent = `Error fetching versions: ${err.message}`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderGitHubVersions(versions) {
            const tbody = document.getElementById('gh-body');
            const table = document.getElementById('gh-table');
            tbody.innerHTML = '';

            versions.forEach(v => {
                const dateStr = v.date
                    ? new Date(v.date).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
                    : '—';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><a href="https://github.com/runelite/runelite/releases/tag/${v.tag}" target="_blank" class="tag-link"><span class="tag">${v.tag}</span></a></td>
                    <td>
                        <div class="version-container">
                            <span class="version">${v.version}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${v.version}', this)" title="Copy version">📋</button>
                        </div>
                    </td>
                    <td class="date-cell">${dateStr}</td>
                    <td>
                        <div class="version-container">
                            <span class="commit-hash" title="${v.commitHash}">${v.commitHash}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${v.commitHash}', this)" title="Copy commit hash">📋</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            table.style.display = 'table';
        }

        // ── Maven tab ─────────────────────────────────────────────────────────

        const MAVEN_URL = 'https://repo.runelite.net/net/runelite/client/maven-metadata.xml';

        async function fetchMavenVersions() {
            const loading = document.getElementById('mv-loading');
            const error   = document.getElementById('mv-error');
            const table     = document.getElementById('mv-table');
            const metaTable = document.getElementById('mv-meta-table');
            const footer    = document.getElementById('mv-last-updated');

            loading.style.display   = 'block';
            error.style.display     = 'none';
            table.style.display     = 'none';
            metaTable.style.display = 'none';

            try {
                let text;
                // Try direct fetch first; fall back to CORS proxy
                try {
                    const res = await fetch(MAVEN_URL);
                    if (!res.ok) throw new Error(`status ${res.status}`);
                    text = await res.text();
                } catch (_) {
                    const proxy = `https://corsproxy.io/?url=${encodeURIComponent(MAVEN_URL)}`;
                    const res = await fetch(proxy);
                    if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
                    text = await res.text();
                }

                const xml = new DOMParser().parseFromString(text, 'text/xml');
                const versionEls = Array.from(xml.querySelectorAll('versions version'));
                const last5 = versionEls.slice(-5).reverse().map(el => el.textContent.trim());
                const latest          = xml.querySelector('versioning > latest')?.textContent?.trim() ?? '—';
                const release         = xml.querySelector('versioning > release')?.textContent?.trim() ?? '—';
                const lastUpdatedRaw  = xml.querySelector('lastUpdated')?.textContent?.trim() ?? '';
                const lastUpdatedStr  = lastUpdatedRaw.length === 14
                    ? parseMavenTimestamp(lastUpdatedRaw).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }) + ' UTC'
                    : '—';

                renderMavenMeta(latest, release, lastUpdatedStr);
                renderMavenVersions(last5);
            } catch (err) {
                console.error(err);
                error.style.display = 'block';
                error.textContent = `Error fetching Maven metadata: ${err.message}`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function parseMavenTimestamp(s) {
            // Format: yyyyMMddHHmmss (UTC)
            return new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}T${s.slice(8,10)}:${s.slice(10,12)}:${s.slice(12,14)}Z`);
        }

        function renderMavenMeta(latest, release, lastUpdated) {
            const tbody = document.getElementById('mv-meta-body');
            const table = document.getElementById('mv-meta-table');
            tbody.innerHTML = `
                <tr>
                    <td><span class="maven-snapshot">${latest}</span></td>
                    <td><span class="maven-version">${release}</span></td>
                    <td class="date-cell">${lastUpdated}</td>
                </tr>
            `;
            table.style.display = 'table';
        }

        function renderMavenVersions(versions) {
            const tbody = document.getElementById('mv-body');
            const table = document.getElementById('mv-table');
            tbody.innerHTML = '';

            versions.forEach(v => {
                const isSnapshot = v.endsWith('-SNAPSHOT');
                const badgeClass = isSnapshot ? 'maven-snapshot' : 'maven-version';
                const row = document.createElement('tr');
                row.innerHTML = `<td><span class="${badgeClass}">${v}</span></td>`;
                tbody.appendChild(row);
            });

            table.style.display = 'table';
        }

        // ── Shared ────────────────────────────────────────────────────────────

        async function copyToClipboard(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (_) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            if (btn) {
                btn.classList.add('copy-success');
                btn.textContent = '✓';
                setTimeout(() => {
                    btn.classList.remove('copy-success');
                    btn.textContent = '📋';
                }, 1500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchGitHubVersions();
            fetchMavenVersions();
        });
    </script>
</body>
</html>
