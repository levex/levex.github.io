<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoX Checklist Review — xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem 1.5rem 4rem;
    }

    .page { max-width: 680px; margin: 0 auto; }

    a.back {
      display: inline-block;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: #444;
      text-decoration: none;
      transition: color 0.15s;
    }
    a.back:hover { color: #aaa; }

    header { margin-bottom: 2rem; }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .subtitle { font-size: 0.85rem; color: #555; }

    .meta-section {
      background: #16161a;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
    }

    .meta-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
    }

    .meta-field label {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a42;
    }

    .meta-field input {
      background: #0f0f11;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.9rem;
      padding: 0.45rem 0.7rem;
      outline: none;
      width: 100%;
    }

    .meta-field input:focus { border-color: #4a4a54; }

    .boss-section {
      background: #16161a;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .boss-header {
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .boss-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .boss-icon {
      height: 32px;
      width: auto;
      object-fit: contain;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .boss-link {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #c8c8cc;
      text-decoration: none;
      transition: color 0.15s;
    }

    .boss-link:hover { color: #fff; }

    .check-item {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #1e1e22;
    }

    .check-item:last-child { border-bottom: none; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .check-label {
      flex: 1;
      font-size: 0.875rem;
      color: #e8e8e8;
      min-width: 0;
    }

    .raid-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .raid-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #3a3a42;
    }

    .status-selector {
      display: flex;
      gap: 2px;
      background: #0f0f11;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 2px;
    }

    .status-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      line-height: 1;
      color: #444;
      font-family: inherit;
      font-weight: 600;
    }

    .status-btn:hover { background: #2a2a2e; color: #888; }

    .status-btn[data-status="✅"].active  { background: #4ec94e44; color: #7ddd7d; box-shadow: inset 0 0 0 1px #4ec94e66; }
    .status-btn[data-status="❌"].active  { background: #e54e4e44; color: #f07878; box-shadow: inset 0 0 0 1px #e54e4e66; }
    .status-btn[data-status="N/A"].active { background: #88888833; color: #ccc;    box-shadow: inset 0 0 0 1px #88888866; }

    .notes-area { margin-top: 0.55rem; }

    .note-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
    }

    .note-input {
      flex: 1;
      background: #0f0f11;
      border: 1px solid #1e1e22;
      border-radius: 5px;
      color: #e8e8e8;
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
      outline: none;
      font-family: inherit;
    }

    .note-input:focus { border-color: #2a2a2e; }
    .note-input::placeholder { color: #4a4a54; }

    .note-remove {
      border: none;
      background: transparent;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem 0.3rem;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .note-remove:hover { color: #e54e4e; }

    .add-note-btn {
      border: none;
      background: #2a2a2e;
      color: #aaa;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      padding: 0.25rem 0.6rem;
      margin-top: 0.3rem;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }

    .add-note-btn:hover { background: #3a3a42; color: #e8e8e8; }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      padding: 0.65rem 1.25rem;
      border: 1px solid #2a2a2e;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #16161a;
      color: #e8e8e8;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #1e1e24; border-color: #3a3a42; }

    .btn.primary {
      background: #4ec94e18;
      border-color: #4ec94e44;
      color: #4ec94e;
    }

    .btn.primary:hover { background: #4ec94e28; border-color: #4ec94e88; }

    .btn.secondary {
      background: transparent;
      border-color: #2a2a2e;
      color: #555;
    }

    .btn.secondary:hover { background: #1e1e24; border-color: #3a3a42; color: #888; }

    .btn.danger {
      background: transparent;
      border-color: #2a2a2e;
      color: #555;
    }

    .btn.danger:hover { background: #e54e4e18; border-color: #e54e4e44; color: #e54e4e; }

    .preview-section {
      background: #16161a;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      margin-top: 1.25rem;
      overflow: hidden;
    }

    .preview-header {
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid #2a2a2e;
    }

    .preview-label {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a42;
    }

    .preview-body {
      padding: 1rem 1.25rem;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.78rem;
      color: #666;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      max-height: 320px;
      overflow-y: auto;
    }

    .dot-overall { background: #888; }
    .dot-floor1  { background: #4ec94e; }
    .dot-floor2  { background: #e8b84e; }
    .dot-floor3  { background: #e87a2e; }
    .dot-olm     { background: #ae4ee8; }

    @media (max-width: 520px) {
      .meta-section { flex-direction: column; }
      .check-label { font-size: 0.8rem; }
      .status-btn { width: 2rem; height: 2rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="/vintage/">← back</a>

    <header>
      <h1>CoX Checklist</h1>
      <div class="subtitle">Post-raid review sheet generator</div>
    </header>

    <div class="meta-section">
      <div class="meta-field">
        <label for="input-watcher">Watcher</label>
        <input id="input-watcher" type="text" placeholder="Your name" />
      </div>
      <div class="meta-field">
        <label for="input-raiders">Raiders</label>
        <input id="input-raiders" type="text" placeholder="Comma-separated names" />
      </div>
    </div>

    <div class="meta-section">
      <div class="meta-field">
        <label for="input-name">Name</label>
        <input id="input-name" type="text" placeholder="Zezima" />
      </div>
      <div class="meta-field">
        <label for="input-role">Role / Scale</label>
        <input id="input-role" type="text" placeholder="Solo / Duo / Team" />
      </div>
    </div>

    <div id="checklist"></div>

    <div class="actions">
      <button class="btn primary" id="copy-btn" onclick="copyMd()">Copy to clipboard</button>
      <button class="btn secondary" onclick="exportMd()">Export .md</button>
      <button class="btn danger" onclick="resetAll()">Reset</button>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <div class="preview-label">Preview</div>
      </div>
      <div class="preview-body" id="preview"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'cox-checklist-v1';

    const WIKI = 'https://oldschool.runescape.wiki';

    const BOSSES = [
      {
        id: 'overall',
        name: 'Overall',
        dot: 'dot-overall',
        icon: null,
        wikiUrl: `${WIKI}/w/Chambers_of_Xeric`,
        items: [
          'Proper Banking',
          'Major Role and Spec procedures',
          'Switching gear between rooms + fixing inventory',
          'Brewing on 15s / Hitting on 120 unless unavoidable',
          'Communication with the team',
          'Minimal Tickloss',
          'Being able to keep up with a s18:30 pace run',
        ],
      },
      {
        id: 'floor1',
        name: 'Floor 1',
        dot: 'dot-floor1',
        icon: 'https://oldschool.runescape.wiki/images/thumb/Tekton.png/440px-Tekton.png?a32ab',
        wikiUrl: `${WIKI}/w/Chambers_of_Xeric#Floor_1`,
        items: [
          'Knowing 45 Crabs',
          'Perfect chop cycle and on time for Ice',
          'Running shamans',
        ],
      },
      {
        id: 'floor2',
        name: 'Floor 2',
        dot: 'dot-floor2',
        icon: `${WIKI}/w/Special:FilePath/Vanguard_(melee).png`,
        wikiUrl: `${WIKI}/w/Chambers_of_Xeric#Floor_2`,
        items: [
          'Bridding at vanguards without losing dps / Looking at vangs hp on their own',
          'Try TG at thieving',
          'On time for Vesp',
          'On time for floor 3',
        ],
      },
      {
        id: 'floor3',
        name: 'Floor 3',
        dot: 'dot-floor3',
        icon: `${WIKI}/w/Special:FilePath/Vasa_Nistirio.png`,
        wikiUrl: `${WIKI}/w/Chambers_of_Xeric#Floor_3`,
        items: [
          'Vasa tech / no tick loss',
          'Avoid overkill at mystics',
        ],
      },
      {
        id: 'olm',
        name: 'Olm',
        dot: 'dot-olm',
        icon: `${WIKI}/w/Special:FilePath/Great_Olm.png`,
        wikiUrl: `${WIKI}/w/Great_Olm`,
        items: [
          'Be on time for Olm',
          'Communicate specs',
          'Hitting on 120 stats unless unavoidable',
        ],
      },
    ];

    const STATUSES = ['✅', '❌', 'N/A'];

    const state = {};

    function blankState() {
      for (const boss of BOSSES) {
        state[boss.id] = boss.items.map(() => ({ r1: 'N/A', r2: 'N/A', notes: [] }));
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          watcher: document.getElementById('input-watcher').value,
          raiders: document.getElementById('input-raiders').value,
          name: document.getElementById('input-name').value,
          role: document.getElementById('input-role').value,
          state,
        }));
      } catch (_) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        document.getElementById('input-watcher').value = saved.watcher || '';
        document.getElementById('input-raiders').value = saved.raiders || '';
        document.getElementById('input-name').value = saved.name || '';
        document.getElementById('input-role').value = saved.role || '';
        for (const boss of BOSSES) {
          if (!saved.state[boss.id]) continue;
          boss.items.forEach((_, idx) => {
            const s = saved.state[boss.id][idx];
            if (!s) return;
            state[boss.id][idx].r1 = STATUSES.includes(s.r1) ? s.r1 : 'N/A';
            state[boss.id][idx].r2 = STATUSES.includes(s.r2) ? s.r2 : 'N/A';
            state[boss.id][idx].notes = Array.isArray(s.notes) ? s.notes : (s.notes ? [s.notes] : []);
          });
        }
        return true;
      } catch (_) {
        return false;
      }
    }

    let saveTimer = null;
    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveState, 400);
    }

    function onChange() {
      updatePreview();
      scheduleSave();
    }

    function buildChecklist() {
      const container = document.getElementById('checklist');
      container.innerHTML = '';

      for (const boss of BOSSES) {
        const section = document.createElement('div');
        section.className = 'boss-section';

        const header = document.createElement('div');
        header.className = 'boss-header';
        const dotHtml  = boss.dot ? `<div class="boss-dot ${boss.dot}"></div>` : '';
        const iconHtml = boss.icon ? `<img class="boss-icon" src="${boss.icon}" alt="${boss.name}" />` : '';
        const nameHtml = boss.wikiUrl
          ? `<a class="boss-link" href="${boss.wikiUrl}" target="_blank" rel="noopener">${boss.name}</a>`
          : `<span class="boss-link">${boss.name}</span>`;
        header.innerHTML = dotHtml + iconHtml + nameHtml;
        section.appendChild(header);

        boss.items.forEach((item, idx) => {
          section.appendChild(buildItem(boss, idx, item));
        });

        container.appendChild(section);
      }
    }

    function buildItem(boss, idx, label) {
      const itemEl = document.createElement('div');
      itemEl.className = 'check-item';
      itemEl.id = `item-${boss.id}-${idx}`;

      const row = document.createElement('div');
      row.className = 'check-row';

      const lbl = document.createElement('div');
      lbl.className = 'check-label';
      lbl.textContent = label;

      row.appendChild(lbl);
      row.appendChild(makeRaidGroup(boss.id, idx, 'r1', 'R1'));
      row.appendChild(makeRaidGroup(boss.id, idx, 'r2', 'R2'));

      const notesArea = document.createElement('div');
      notesArea.className = 'notes-area';
      notesArea.id = `notes-area-${boss.id}-${idx}`;

      state[boss.id][idx].notes.forEach((text, noteIdx) => {
        notesArea.appendChild(buildNoteRow(boss.id, idx, noteIdx, text));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-note-btn';
      addBtn.textContent = '✏️ add note';
      addBtn.addEventListener('click', () => {
        state[boss.id][idx].notes.push('');
        const noteIdx = state[boss.id][idx].notes.length - 1;
        notesArea.insertBefore(buildNoteRow(boss.id, idx, noteIdx, ''), addBtn);
        notesArea.querySelector(`#note-${boss.id}-${idx}-${noteIdx}`).focus();
        onChange();
      });

      notesArea.appendChild(addBtn);
      itemEl.appendChild(row);
      itemEl.appendChild(notesArea);
      return itemEl;
    }

    function buildNoteRow(bossId, idx, noteIdx, text) {
      const row = document.createElement('div');
      row.className = 'note-row';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'note-input';
      input.id = `note-${bossId}-${idx}-${noteIdx}`;
      input.placeholder = 'note…';
      input.value = text;
      input.addEventListener('input', e => {
        state[bossId][idx].notes[noteIdx] = e.target.value;
        onChange();
      });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'note-remove';
      removeBtn.textContent = '×';
      removeBtn.setAttribute('aria-label', 'Remove note');
      removeBtn.addEventListener('click', () => {
        state[bossId][idx].notes.splice(noteIdx, 1);
        rebuildNotesArea(bossId, idx);
        onChange();
      });

      row.appendChild(input);
      row.appendChild(removeBtn);
      return row;
    }

    function rebuildNotesArea(bossId, idx) {
      const area = document.getElementById(`notes-area-${bossId}-${idx}`);
      if (!area) return;
      const addBtn = area.querySelector('.add-note-btn');
      area.querySelectorAll('.note-row').forEach(r => r.remove());
      state[bossId][idx].notes.forEach((text, noteIdx) => {
        area.insertBefore(buildNoteRow(bossId, idx, noteIdx, text), addBtn);
      });
    }

    function makeRaidGroup(bossId, idx, field, labelText) {
      const group = document.createElement('div');
      group.className = 'raid-group';

      const lbl = document.createElement('div');
      lbl.className = 'raid-label';
      lbl.textContent = labelText;

      const selector = document.createElement('div');
      selector.className = 'status-selector';
      selector.id = `sel-${bossId}-${idx}-${field}`;

      for (const status of STATUSES) {
        const btn = document.createElement('button');
        const isActive = state[bossId][idx][field] === status;
        btn.className = 'status-btn' + (isActive ? ' active' : '');
        btn.textContent = status;
        btn.dataset.status = status;
        btn.setAttribute('aria-label', status);
        btn.addEventListener('click', () => {
          state[bossId][idx][field] = status;
          refreshSelector(bossId, idx, field);
          onChange();
        });
        selector.appendChild(btn);
      }

      group.appendChild(lbl);
      group.appendChild(selector);
      return group;
    }

    function refreshSelector(bossId, idx, field) {
      const selector = document.getElementById(`sel-${bossId}-${idx}-${field}`);
      if (!selector) return;
      selector.querySelectorAll('.status-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === state[bossId][idx][field]);
      });
    }

    function buildMarkdown() {
      const watcher = document.getElementById('input-watcher').value.trim();
      const raiders = document.getElementById('input-raiders').value.trim();
      const name = document.getElementById('input-name').value.trim() || 'Unknown';
      const role = document.getElementById('input-role').value.trim();
      const header = role ? `${name} - ${role}` : name;

      const lines = [header, ''];

      for (const boss of BOSSES) {
        lines.push(`### ${boss.name}`);
        boss.items.forEach((item, idx) => {
          const { r1, r2, notes } = state[boss.id][idx];
          const status = r1 === r2 ? r1 : `${r1}/${r2}`;
          lines.push(`${item}, ${status}`);
          notes.forEach(n => { if (n.trim()) lines.push(`- ${n.trim()}`); });
        });
        lines.push('');
      }

      if (watcher) lines.push(`Watcher: ${watcher}`);
      if (raiders) lines.push(`Raiders: ${raiders}`);

      return lines.join('\n').trimEnd();
    }

    function updatePreview() {
      document.getElementById('preview').textContent = buildMarkdown();
    }

    function exportMd() {
      const md = buildMarkdown();
      const name = (document.getElementById('input-name').value.trim() || 'player')
        .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}-cox-review.md`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyMd() {
      const btn = document.getElementById('copy-btn');
      navigator.clipboard.writeText(buildMarkdown()).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    function resetAll() {
      if (!confirm('Reset all statuses and notes? This cannot be undone.')) return;
      blankState();
      document.getElementById('input-watcher').value = '';
      document.getElementById('input-raiders').value = '';
      document.getElementById('input-name').value = '';
      document.getElementById('input-role').value = '';
      buildChecklist();
      onChange();
    }

    blankState();
    loadState();
    buildChecklist();
    updatePreview();

    document.getElementById('input-watcher').addEventListener('input', onChange);
    document.getElementById('input-raiders').addEventListener('input', onChange);
    document.getElementById('input-name').addEventListener('input', onChange);
    document.getElementById('input-role').addEventListener('input', onChange);
  </script>
</body>
</html>
