<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads &amp; Resources — xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      width: 100%;
      max-width: 640px;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 1.2rem;
      image-rendering: pixelated;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2.5rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: #aaa; }

    .downloads {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
    }

    .download-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
    }

    .download-item:hover {
      border-color: #555;
      background: #1a1a1e;
    }

    .download-item .info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .download-item .name {
      font-size: 0.9rem;
      color: #e8e8e8;
    }

    .download-item .filename {
      font-size: 0.75rem;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .download-item a {
      padding: 0.4rem 1rem;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      color: #c8c8d0;
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .download-item a:hover {
      border-color: #555;
      color: #fff;
      background: #222226;
    }

    .download-item .actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .copy-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      color: #c8c8d0;
      font-size: 0.82rem;
      font-family: inherit;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      border-color: #555;
      color: #fff;
      background: #222226;
    }

    .copy-btn.copied {
      border-color: #2a4a2e;
      color: #6dbf7a;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://oldschool.runescape.wiki/images/Xarpus.png?a39b0" alt="Xarpus" />
    <h1>xarp.us</h1>
    <p class="tagline">downloads &amp; resources</p>
    <a class="back" href="/">← back</a>
    <div class="downloads">

      <div class="download-item">
        <div class="info">
          <span class="name">Radius Markers for the Nylocas Room</span>
          <span class="filename">nylo_radius_markers.json</span>
        </div>
        <div class="actions">
          <button class="copy-btn" onclick="copyJSON(this, '/osrs/nylo_radius_markers.json')">Copy</button>
          <a href="/osrs/nylo_radius_markers.json" download="nylo_radius_markers.json">Download</a>
        </div>
      </div>

    </div>
  </div>
  <script>
    async function copyJSON(btn, url) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      } catch {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      }
    }
  </script>
</body>
</html>
