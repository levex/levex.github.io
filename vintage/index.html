<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vintage stuff</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 1.2rem;
      image-rendering: pixelated;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2.5rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    nav a {
      display: inline-block;
      padding: 0.55rem 1.4rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #c8c8d0;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: inherit;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      min-width: 200px;
    }

    nav a:hover {
      border-color: #555;
      color: #fff;
      background: #1a1a1e;
    }

    .contact {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #3a3a42;
    }

    .contact span {
      font-family: "SF Mono", "Fira Code", monospace;
      color: #555;
    }

    .back {
      position: fixed;
      top: 1.2rem;
      left: 1.4rem;
      font-size: 0.82rem;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: #e8e8e8; }
  </style>
</head>
<body>
  <a class="back" href="/misc">← back</a>
  <div class="card">
    <img class="logo" src="https://oldschool.runescape.wiki/images/Xarpus.png?a39b0" alt="Xarpus" />
    <h1>vintage</h1>
    <p class="tagline">checklist &amp; vintage raid tools</p>
    <nav>
      <a href="/osrs/vintlist.html">ToB Checklist</a>
      <a href="/osrs/coxlist.html">CoX Checklist</a>
    </nav>
    <p class="contact">discord <span>@lkurusa</span></p>
  </div>
</body>
</html>
