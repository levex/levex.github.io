<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misc Tools — xarp.us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 3rem 1.5rem;
    }

    .card {
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 3rem;
      font-size: 0.85rem;
      color: #444;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: #aaa; }

    .group {
      margin-bottom: 2.5rem;
      text-align: left;
    }

    .group-items {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #c8c8d0;
      text-decoration: none;
      background: transparent;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .item:hover {
      border-color: #555;
      color: #fff;
      background: #1a1a1e;
    }

    .item-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .item-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .item-name {
      font-size: 0.9rem;
      color: inherit;
    }

    .item-desc {
      font-size: 0.75rem;
      color: #555;
    }

    .item:hover .item-desc {
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Misc Tools</h1>
    <p class="tagline">utilities &amp; monitors</p>
    <a class="back" href="/">← back</a>

    <div class="group">
      <div class="group-items">
        <a href="/osrs/isgameup.html" class="item">
          <div class="item-icon">🟢</div>
          <div class="item-text">
            <span class="item-name">Is Game Up?</span>
            <span class="item-desc">Check if OSRS servers are online</span>
          </div>
        </a>
        <a href="/osrs/rlver.html" class="item">
          <div class="item-icon">🔌</div>
          <div class="item-text">
            <span class="item-name">RuneLite Version Monitor</span>
            <span class="item-desc">Track RuneLite client version history</span>
          </div>
        </a>
        <a href="/osrs/widgetpacker.html" class="item">
          <div class="item-icon">📦</div>
          <div class="item-text">
            <span class="item-name">Widget Packer</span>
            <span class="item-desc">Pack and unpack OSRS widget IDs</span>
          </div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
